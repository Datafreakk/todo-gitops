name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # allow manual trigger from GitHub Actions UI

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/datafreakk/todo-api

jobs:
  build-scan-push:
    name: Build, Scan, Push
    runs-on: ubuntu-latest
    permissions:
      contents: write        # needed to commit updated image tag back to repo
      packages: write        # needed to push to GHCR
      security-events: write # needed for Trivy SARIF upload

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set image tag
        id: meta
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (for multi-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build multi-platform (amd64 for cloud/CI, arm64 for Apple Silicon local kind cluster)
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: app/
          file: app/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.repositoryUrl }}

      # Trivy scan disabled — re-enable once base image CVEs are resolved
      # - name: Trivy vulnerability scan
      #   uses: aquasecurity/trivy-action@master
      #   with:
      #     image-ref: ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
      #     format: sarif
      #     output: trivy-results.sarif
      #     severity: CRITICAL,HIGH
      #     ignore-unfixed: true
      #     exit-code: "1"

      # Update the image tag in dev overlay — ArgoCD detects this commit and auto-syncs
      - name: Update dev overlay image tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cd k8s/overlays/dev
          # Requires kustomize on the runner
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          ./kustomize edit set image ghcr.io/datafreakk/todo-api=${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}

      - name: Commit updated dev image tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/dev/kustomization.yaml
          git diff --staged --quiet || git commit -m "ci: update dev image to ${{ steps.meta.outputs.tag }} [skip ci]"
          git push
