apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: todo-dev

resources:
- ../../base
- namespace.yaml

# Kustomize image transform — CI updates this value via:
# kustomize edit set image ghcr.io/datafreakk/todo-api=ghcr.io/datafreakk/todo-api:sha-<commit>
images:
- name: ghcr.io/datafreakk/todo-api
  newName: ghcr.io/datafreakk/todo-api
  newTag: sha-bce969b

patches:
- path: patch-resources.yaml
  target:
    kind: Deployment
    name: todo-api

replicas:
- count: 1
  name: todo-api
