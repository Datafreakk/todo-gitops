# Kind cluster config: 1 control-plane + 2 workers
# Ports 80/443 exposed for ingress-nginx
# extraMounts: maps a host directory for Prometheus PVC persistence across cluster recreations
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: todo-gitops
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
    extraMounts:
      - hostPath: /tmp/todo-gitops-prometheus
        containerPath: /prometheus-data
  - role: worker
  - role: worker
